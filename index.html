<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPPU Result Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>SAVITRIBAI PHULE PUNE UNIVERSITY</h1>
    <h3>Online Result System</h3>

    <input type="text" id="prn" placeholder="Enter PRN / Application Number">
    <button onclick="checkResult()">Search Result</button>
    
    <div id="result" style="display:none;">
<hr>

<h2 id="studentName"></h2>

<p><b>PRN:</b> <span id="studentPRN"></span></p>
<p><b>Seat No:</b> <span id="seatNo"></span></p>
<p><b>College:</b> <span id="college"></span></p>
<p><b>Course:</b> <span id="course"></span></p>
<p><b>Semester:</b> <span id="semester"></span></p>

<table border="1">
<tr>
<th>Subject</th>
<th>Marks</th>
<th>Grade</th>
</tr>

<tr>
<td>Thermodynamics</td>
<td>85</td>
<td>A+</td>
</tr>

<tr>
<td>Machine Design</td>
<td>90</td>
<td>O</td>
</tr>

</table>

<p><b>SGPA:</b> <span id="sgpa"></span></p>
<p><b>CGPA:</b> <span id="cgpa"></span></p>

<button onclick="window.print()">Print Result</button>

</div>

<script src="script.js"></script>

</body>
</html>
